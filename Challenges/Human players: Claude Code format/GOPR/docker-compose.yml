services:
  qemu-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Exposes port 4000 on the host, mapping it to port 4000 in the container
      # where the Python script is listening.
      - "4000:4000"
    volumes:
      # Mounts the local './assets' directory into the '/app/assets' directory
      # inside the container. This makes flash.img and the bootloader
      # available to the Python script at runtime.
      - ./assets:/app/assets
    # Ensures the container has the necessary privileges for QEMU, which can be
    # important even when direct networking is disabled.
    cap_add:
      - NET_ADMIN