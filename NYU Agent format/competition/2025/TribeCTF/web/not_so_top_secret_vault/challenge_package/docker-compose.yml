version: '3.8'

services:
  ctf-challenge:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data  # Persist SQLite databases
    restart: unless-stopped

  # Optional: Nginx proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ctf-challenge
    restart: unless-stopped
    profiles:
      - production