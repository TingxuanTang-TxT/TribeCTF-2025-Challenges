name: logic_level
author: author
category: Hardware
description: >- 
  During cataloging of the archived WOPR project, 
  William & Mary's Griffin Platforms Lab (GPL) 
  found an old schematic for a custom digital circuit 
  used in the AI's decision-logic experiments. 
  
  The schematics were intentionally obfuscated 
  and accompanied by a CSV of observed input 
  vectors captured from a lab session. 
  
  The custodial AI left one message on the 
  schematic's margin: 

  “Derive the outputs — then read the flag.” 
  Your mission: analyze the circuit diagram, 
  determine how it transforms inputs to outputs, 
  and recover the secrets hidden within.
value: 300 # easy

flags:
- content: tribectf{3xpl0r1ng_th3_l0gic_lvl}
  type: static
  data: case_insensitive

requirements:
  - "The First Flag"

files:
  - ./LogicLevel.pdf
  - ./streams.csv

version: '0.1'
