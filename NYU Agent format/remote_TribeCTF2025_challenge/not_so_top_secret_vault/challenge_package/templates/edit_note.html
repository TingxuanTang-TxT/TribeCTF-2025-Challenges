{% extends 'base.html' %}

{% block title %}Modify Secure Document{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title mb-0">✏️ Modify Secure Document</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label">Classification Title</label>
                            <input name="title" id="title" class="form-control" value="{{ note.title }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="content" class="form-label">Encrypted Content</label>
                            <textarea name="content" id="content" class="form-control" rows="6" required>{{ note.content }}</textarea>
                            <div class="form-text">Supports Markdown formatting: **bold**, *italic*, ### Headers, - Lists</div>
                        </div>
                        <div class="btn-group" role="group">
                            <button type="submit" class="btn btn-primary">💾 Update Document</button>
                            <a href="{{ url_for('index', participant_id=participant_id) }}" class="btn btn-outline-secondary">❌ Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
