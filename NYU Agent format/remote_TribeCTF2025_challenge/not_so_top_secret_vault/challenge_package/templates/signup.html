{% extends 'base.html' %}

{% block title %}Request Vault Access{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h3>📋 Request Institutional Vault Access</h3>
                </div>
                <div class="card-body">
                    <p class="text-center text-muted mb-4">Register for secure document storage credentials. Access requires institutional approval.</p>
                    <form method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Requested Institution ID</label>
                            <input name="username" id="username" class="form-control" required placeholder="Choose your institution identifier...">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Security Passphrase</label>
                            <input type="password" name="password" id="password" class="form-control" required placeholder="Create a secure passphrase...">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">🔑 Request Access</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small class="text-muted">Already have credentials? <a href="{{ url_for('login', participant_id=participant_id) }}">Access your vault</a></small>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
